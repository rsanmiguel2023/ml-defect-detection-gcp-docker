version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml-defect-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./models:/app/models
      - ./reports:/app/reports
      - ./mlruns:/app/mlruns

    restart: unless-stopped

    command: >
      uvicorn app.api:app
      --host 0.0.0.0
      --port 8000

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: ml-defect-dashboard

    ports:
      - "8501:8501"

    depends_on:
      - api

    env_file:
      - .env

    volumes:
      - ./models:/app/models
      - ./reports:/app/reports

    command: >
      streamlit run app/streamlit_app.py
      --server.port=8501
      --server.address=0.0.0.0